<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Orbint | Orbital Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="video-background">
        <video autoplay muted loop playsinline disableremoteplayback disablepictureinpicture controlslist="nodownload" oncontextmenu="return false;" poster="fallback-image.jpg">
            <source src="60sLEO.mp4" type="video/mp4">
        </video>
    </div>

    <nav>
        <div class="nav-content">        
            <a href="index.html" class="logo">
                <img src="assets/images/black_black_logo.png" alt="Orbint" style="height: 50px; width: auto;">
            </a>
            <div class="nav-links">
                <a href="index.html" class="mono">Mission</a>
                <a href="news.html" class="mono">News</a>
                <a href="career.html" class="mono">Career</a>
                <a href="company.html" class="mono active">About Us</a>
                <a href="contact.html" class="mono">Contact</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
        <h1 id="typewriter">Delivering actionable RF intelligence from orbit to secure a more informed world.</h1> 
        </section>

        <section id="founders">
            <h2>Our Founders</h2>
            <div class="founders-grid">
                <div class="founder-card">
                    <img src="assets/images/founders/alexander-schmidt.jpg" alt="Alexander Schmidt" class="founder-avatar">
                    <div>
                        <div class="founder-name">Dr. Alexander Schmidt</div>
                        <div class="mono founder-role">Co-Founder & Co-CEO</div>
                    </div>
                </div>
                <div class="founder-card">
                    <img src="assets/images/founders/simon-heine.jpg" alt="Simon Heine" class="founder-avatar">
                    <div>
                        <div class="founder-name">Simon Heine</div>
                        <div class="mono founder-role">Co-Founder & Co-CEO</div>
                    </div>
                </div>
                <div class="founder-card">
                    <img src="assets/images/founders/daniel-weinzierl.jpg" alt="Daniel Weinzierl" class="founder-avatar">
                    <div>
                        <div class="founder-name">Daniel Weinzierl</div>
                        <div class="mono founder-role">Co-Founder & CTO</div>
                    </div>
                </div>
                <div class="founder-card">
                    <img src="assets/images/founders/winfried-stock.jpg" alt="Winfried Stock" class="founder-avatar">
                    <div>
                        <div class="founder-name">Winfried Stock</div>
                        <div class="mono founder-role">Co-Founder & CTO</div>
                    </div>
                </div>
            </div>

        <div id="footer-placeholder"></div>
