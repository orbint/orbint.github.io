<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>News | Orbint</title>
    <style>
        #main-nav.scrolled,
        #main-nav {
            background: rgba(18, 17, 16, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .page-header {
            padding: 130px 80px 72px;
            border-bottom: 1px solid var(--dark-border);
        }
        .page-back {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
            color: var(--fg-ter-dark); text-decoration: none;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            transition: color 150ms;
            margin-bottom: 40px;
        }
        .page-back:hover { color: var(--orange); }

        .page-header-title {
            font-size: clamp(28px, 4vw, 56px); font-weight: 700;
            color: #fff; line-height: 1.1; letter-spacing: -0.02em;
            max-width: 720px; margin-top: 12px;
        }
        .page-header-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; color: var(--fg-sec-dark);
            letter-spacing: 0.08em; margin-top: 16px;
        }

        .article-content {
            padding: 72px 80px 96px;
            max-width: 860px;
            margin: 0 auto;
        }

        .article-body h2 {
            font-size: 19px; font-weight: 700; color: #fff;
            margin: 40px 0 12px; letter-spacing: -0.01em;
        }
        .article-body h3 {
            font-size: 15px; font-weight: 600; color: var(--fg-dark);
            margin: 24px 0 8px;
        }
        .article-body p {
            font-size: 15px; line-height: 1.75; color: var(--fg-sec-dark);
            margin-bottom: 14px;
        }
        .article-body ul, .article-body ol {
            padding-left: 20px; margin-bottom: 16px;
        }
        .article-body li {
            font-size: 15px; line-height: 1.7; color: var(--fg-sec-dark);
            margin-bottom: 6px;
        }
        .article-body strong { color: var(--fg-dark); font-weight: 600; }
        .article-body a { color: var(--orange); text-decoration: none; }
        .article-body a:hover { text-decoration: underline; }
        .article-body img {
            width: 100%; border-radius: 6px;
            margin: 24px 0; display: block;
            border: 1px solid var(--dark-border);
        }
        .article-body blockquote {
            border-left: 3px solid var(--orange);
            padding: 12px 0 12px 20px; margin: 24px 0;
            font-size: 16px; color: var(--fg-dark); font-style: italic;
        }

        .site-footer {
            padding: 48px 80px;
            border-top: 1px solid var(--dark-border);
            display: flex; align-items: center; justify-content: space-between;
            gap: 24px; flex-wrap: wrap;
        }
        .site-footer-logo { height: 30px; width: auto; opacity: 0.7; }
        .site-footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
        .site-footer-link {
            font-size: 11px; color: var(--fg-ter-dark); text-decoration: none;
            font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em;
            text-transform: uppercase; transition: color 150ms;
        }
        .site-footer-link:hover { color: var(--orange); }
        .site-footer-copy {
            font-size: 11px; color: var(--fg-ter-dark);
            font-family: 'JetBrains Mono', monospace;
        }

        @media (max-width: 768px) {
            .page-header { padding: 110px 24px 48px; }
            .article-content { padding: 48px 24px 64px; }
            .site-footer { padding: 40px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav id="main-nav">
    <div class="nav-content">
        <a href="../index.html" class="logo logo-crossfade">
            <img id="nav-logo-dark" src="../assets/images/white_white_logo.png" alt="Orbint">
            <img id="nav-logo-light" src="../assets/images/black_black_logo.png" alt="">
        </a>
        <div class="nav-links">
            <a href="../index.html#mission" class="mono">Mission</a>
            <a href="../index.html#about" class="mono">About Us</a>
            <a href="../index.html#career" class="mono">Career</a>
            <a href="../index.html#news" class="mono active">News</a>
            <a href="../index.html#contact" class="mono">Contact</a>
        </div>
        <button id="hamburger" class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobile-menu" class="mobile-menu">
    <a href="../index.html#mission">Mission</a>
    <a href="../index.html#about">About Us</a>
    <a href="../index.html#career">Career</a>
    <a href="../index.html#news" class="active">News</a>
    <a href="../index.html#contact">Contact</a>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
    <a href="../index.html#news" class="page-back">← All news</a>
    <div class="section-label" id="article-category">News</div>
    <h1 class="page-header-title" id="article-title">Loading…</h1>
    <div class="page-header-sub" id="article-meta"></div>
</div>

<!-- CONTENT -->
<div class="article-content">
    <div class="article-body" id="article-body"></div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
    <img src="../assets/images/white_white_logo.png" alt="Orbint" class="site-footer-logo">
    <div class="site-footer-links">
        <a href="../index.html#mission" class="site-footer-link">Mission</a>
        <a href="../index.html#news" class="site-footer-link">News</a>
        <a href="../index.html#contact" class="site-footer-link">Contact</a>
        <a href="../impressum.html" class="site-footer-link">Impressum</a>
        <a href="../privacy.html" class="site-footer-link">Privacy</a>
    </div>
    <div class="site-footer-copy">© 2026 Orbint GmbH</div>
</footer>

<script src="../js/nscript.js"></script>
<script>
    const slug = new URLSearchParams(location.search).get('slug');

    if (!slug) {
        location.href = '../index.html#news';
    } else {
        fetch(`articles/${slug}.json`)
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(article => {
                document.title = `${article.title} | Orbint`;
                document.getElementById('article-category').textContent = article.category || 'News';
                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-meta').textContent = article.date || '';
                document.getElementById('article-body').innerHTML = article.body;
            })
            .catch(() => {
                document.getElementById('article-body').innerHTML =
                    '<p style="color:var(--fg-sec-dark)">Article not found.</p>';
            });
    }
</script>
</body>
</html>
