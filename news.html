<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Orbint | Orbital Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="video-background">
        <video autoplay muted loop playsinline disableremoteplayback disablepictureinpicture controlslist="nodownload" oncontextmenu="return false;">
            <source src="assets/videos/60sLEO.mp4" type="video/mp4">
        </video>
        <img src="assets/images/60sLEO.gif" alt="" class="bg-fallback">
    </div>

    <nav>
        <div class="nav-content">        
            <a href="index.html" class="logo">
                <img src="assets/images/black_black_logo.png" alt="Orbint" style="height: 50px; width: auto;">
            </a>
            <div class="nav-links">
                <a href="index.html" class="mono">Mission</a>
                <a href="news.html" class="mono active">News</a>
                <a href="career.html" class="mono">Career</a>
                <a href="company.html" class="mono">About Us</a>
                <a href="contact.html" class="mono">Contact</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
        <h1 id="typewriter">Stay updated about Orbint's latest developments and achievements.</h1> 
        </section>

        <section id="news-feed-section">
            <h2>Articles</h2>
            <div id="news-feed"><div class="mono" style="opacity: 0.5;">Loading...</div></div>
        </section>

        <script>
            const slugs = [
                'bdi-newspace-100th-member',
                'tag-der-raumfahrt-space-cafe',
            ];

            Promise.all(
                slugs.map(slug =>
                    fetch(`news/articles/${slug}.json`).then(r => r.json()).then(a => ({ ...a, slug }))
                )
            ).then(articles => {
                document.getElementById('news-feed').innerHTML = `<ul class="job-list">${articles.map(a => `
                    <li><a href="news/article.html?slug=${a.slug}" class="job-list-item">${a.title}</a></li>
                `).join('')}</ul>`;
            });
        </script>

        <div id="footer-placeholder"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
