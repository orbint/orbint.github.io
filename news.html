<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Orbint | Orbital Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="video-background">
        <video autoplay muted loop playsinline disableremoteplayback disablepictureinpicture controlslist="nodownload" oncontextmenu="return false;" poster="fallback-image.jpg">
            <source src="60sLEO.mp4" type="video/mp4">
        </video>
    </div>

    <nav>
        <div class="nav-content">        
            <a href="index.html" class="logo">
                <img src="assets/images/black_black_logo.png" alt="Orbint" style="height: 70px; width: auto;">
            </a>
            <div class="nav-links">
                <a href="index.html" class="mono">Mission</a>
                <a href="news.html" class="mono active">News</a>
                <a href="career.html" class="mono">Career</a>
                <a href="company.html" class="mono">About Us</a>
                <a href="contact.html" class="mono">Contact</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <div class="mono" style="margin-bottom: 1.5rem;">Transmission Log // News</div>
        <h1 id="typewriter">Stay updated about Orbint's latest developments and achievements.</h1> 
        </section>

        <section id="news-feed">
            <div class="mono" style="opacity: 0.5;">Loading...</div>
        </section>

        <script>
            const slugs = [
                'bdi-newspace-100th-member',
                'tag-der-raumfahrt-space-cafe',
            ];

            Promise.all(
                slugs.map(slug =>
                    fetch(`news/articles/${slug}.json`).then(r => r.json()).then(a => ({ ...a, slug }))
                )
            ).then(articles => {
                document.getElementById('news-feed').innerHTML = articles.map((a, i) => `
                    ${i > 0 ? '<hr class="news-divider">' : ''}
                    <article class="news-card">
                        <div class="mono news-meta">${a.date} // ${a.category}</div>
                        <h2>${a.title}</h2>
                        <p>${a.excerpt}</p>
                        <a href="news/article.html?slug=${a.slug}" class="mono" style="color: var(--orbint-orange);">Read Article →</a>
                    </article>
                `).join('');
            });
        </script>

        <div id="footer-placeholder"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
