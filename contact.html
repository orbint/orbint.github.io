<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Orbint | Orbital Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="video-background">
        <img src="assets/images/60sLEO.gif" alt="">
    </div>

    <nav>
        <div class="nav-content">        
            <a href="index.html" class="logo">
                <img src="assets/images/black_black_logo.png" alt="Orbint" style="height: 50px; width: auto;">
            </a>
            <div class="nav-links">
                <a href="index.html" class="mono">Mission</a>
                <a href="news.html" class="mono">News</a>
                <a href="career.html" class="mono">Career</a>
                <a href="company.html" class="mono">About Us</a>
                <a href="contact.html" class="mono active">Contact</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <h1 id="typewriter">Connect With Our Team.</h1>
        </section>

        <section class="contact-section">
            <div class="contact-wrap">
                <form id="contact-form" novalidate>
                    <div class="form-group">
                        <label class="mono" for="contact-name">Name *</label>
                        <input type="text" id="contact-name" name="name" placeholder="Your name" maxlength="100" required>
                    </div>
                    <div class="form-group">
                        <label class="mono" for="contact-email">Email *</label>
                        <input type="email" id="contact-email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="mono" for="contact-phone">Phone</label>
                        <input type="tel" id="contact-phone" name="phone" placeholder="+49 89 ..." maxlength="30">
                    </div>
                    <div class="form-group">
                        <label class="mono" for="contact-message">Message *</label>
                        <textarea id="contact-message" name="message" rows="6" placeholder="How can we help?" maxlength="2000" required></textarea>
                    </div>
                    <div id="form-error" class="form-feedback form-error" hidden></div>
                    <div id="form-success" class="form-feedback form-success" hidden>
                        Your message has been sent. We will get back to you shortly.
                    </div>
                    <button type="submit" class="btn" id="form-submit">Send Message</button>
                </form>
            </div>
        </section>

        <div id="footer-placeholder"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
