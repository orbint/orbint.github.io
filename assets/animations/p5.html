<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="p5.css">
</head>
<body>
    <div id="colorPanel">
        <div class="header">
            <div id="swatch"></div>
            <span>Color</span>
        </div>
        <div class="rgb-row">
            <label>R</label>
            <input type="range" id="rSlider" min="0" max="255" value="255">
            <span id="rVal">255</span>
        </div>
        <div class="rgb-row">
            <label>G</label>
            <input type="range" id="gSlider" min="0" max="255" value="165">
            <span id="gVal">165</span>
        </div>
        <div class="rgb-row">
            <label>B</label>
            <input type="range" id="bSlider" min="0" max="255" value="0">
            <span id="bVal">0</span>
        </div>
        <div id="hexRow">
            <label>#</label>
            <input type="text" id="hexInput" maxlength="6" value="FFA500" spellcheck="false">
        </div>
        <div class="rgb-row" style="margin-top:4px;">
            <label style="width:10px">W</label>
            <input type="range" id="thickSlider" min="0" max="2" step="0.25" value="0.25" style="width:120px;">
            <span id="thickVal" style="width:26px;text-align:right;">0.25</span>
        </div>
        <div style="border-top: 1px solid var(--col-faint); margin-top: 4px; padding-top: 8px; font-size: 13px; font-weight: bold;">Globe</div>
        <div class="rgb-row">
            <label style="width:24px">Lon</label>
            <input type="range" id="lonSlider" min="-180" max="180" value="10">
            <span id="lonVal" style="width:32px">10</span>
        </div>
        <div class="rgb-row">
            <label style="width:24px">Lat</label>
            <input type="range" id="latSlider" min="-90" max="90" value="45">
            <span id="latVal" style="width:32px">45</span>
        </div>
        <div style="border-top:1px solid var(--col-faint);margin-top:4px;padding-top:8px;font-size:13px;font-weight:bold;">Ground Stations</div>
        <div id="gsList"></div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
            <input type="number" id="gsAngleInput" value="0" min="-360" max="360"
                style="background:transparent;border:none;border-bottom:1px solid var(--col-faint);color:var(--col);font-family:monospace;font-size:12px;width:44px;outline:none;text-align:right;">
            <span style="opacity:0.6">°</span>
            <button id="gsAddBtn"
                style="background:transparent;border:1px solid var(--col-faint);color:var(--col);font-family:monospace;font-size:14px;cursor:pointer;padding:1px 8px;border-radius:4px;line-height:1.4;">+</button>
        </div>
        <div style="border-top:1px solid var(--col-faint);margin-top:4px;padding-top:8px;font-size:13px;font-weight:bold;">Emitters</div>
        <div id="emitterList"></div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
            <input type="number" id="emAngleInput" value="0" min="-360" max="360"
                style="background:transparent;border:none;border-bottom:1px solid var(--col-faint);color:var(--col);font-family:monospace;font-size:12px;width:44px;outline:none;text-align:right;">
            <span style="opacity:0.6">°</span>
            <button id="emAddBtn"
                style="background:transparent;border:1px solid var(--col-faint);color:var(--col);font-family:monospace;font-size:14px;cursor:pointer;padding:1px 8px;border-radius:4px;line-height:1.4;">+</button>
        </div>
    </div>

    <div id="controls">
        <div class="control">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="0" max="100" value="50">
            <span id="speedVal">1,000x</span>
        </div>
        <div class="control">
            <label>Orbit Height</label>
            <input type="range" id="orbitSlider" min="0" max="100" value="30">
            <span id="orbitVal">613 km</span>
        </div>
    </div>

    <script src="p5.js"></script>
</body>
</html>
