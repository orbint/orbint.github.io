<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 1px solid #333; }
    </style>
</head>
<body>
    <script>
        const COL = [255, 165, 0];
        const R = 1600;       
        const H = 140;        
        const START_ANG = 72;
        const END_ANG = 108;
        let satAngle = START_ANG;    

        let worldBorders = null;
        let projection;
        let geoPath;

        const VIEW_LON = 90; 
        const VIEW_LAT = -5; 

        async function loadWorldData() {
            const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
            const data = await response.json();
            worldBorders = topojson.mesh(data, data.objects.countries);
        }

        function setup() {
            createCanvas(800, 400);
            angleMode(DEGREES);
            textFont('Inter');
            loadWorldData();
        }

        function draw() {
            background(0); 
            const cx = width / 2;
            const cy = height + 1510; 

            projection = d3.geoOrthographic()
                .scale(R)
                .translate([cx, cy])
                .rotate([-VIEW_LON, -VIEW_LAT, 0])
                .clipAngle(90);
            geoPath = d3.geoPath(projection, drawingContext);

            // 1. GLOBE
            drawGlobe(cx, cy);

            // 2. ORBIT PATH
            stroke(COL[0], COL[1], COL[2], 30);
            strokeWeight(1);
            noFill();
            arc(cx, cy, (R + H) * 2, (R + H) * 2, 255, 285);

            // 3. ANIMATION LOGIC
            satAngle += 0.04; 
            if (satAngle > END_ANG) satAngle = START_ANG; 

            let satAlpha = 255;
            let currentProgress = satAngle - START_ANG;
            let totalRange = END_ANG - START_ANG;
            if (currentProgress < totalRange * 0.1) {
                satAlpha = map(currentProgress, 0, totalRange * 0.1, 0, 255);
            } else if (currentProgress > totalRange * 0.9) {
                satAlpha = map(currentProgress, totalRange * 0.9, totalRange, 255, 0);
            }

            // 4. ICONS
            drawIcon(cx, cy, 84, 'emitter'); 
            drawIcon(cx, cy, 96, 'dish');    

            // 5. DATA LINK
            if (abs(satAngle - 96) < 3.5) {
                let [tx, ty] = getSurfacePos(cx, cy, 96);
                let lx = cx + cos(270 + (satAngle - 90)) * (R + H);
                let ly = cy + sin(270 + (satAngle - 90)) * (R + H);
                drawDashedLine(lx, ly, tx, ty, satAlpha);
            }

            // 6. SATELLITE FORMATION
            let formation = [
                { a: satAngle, h: H },
                { a: satAngle - 1.2, h: H + 12 },
                { a: satAngle - 1.2, h: H - 12 }
            ];
            formation.forEach(sat => {
                let sx = cx + cos(270 + (sat.a - 90)) * (R + sat.h);
                let sy = cy + sin(270 + (sat.a - 90)) * (R + sat.h);
                drawSatellite(sx, sy, sat.a, satAlpha);
            });

            // 7. LABELS
            drawDynamicLabels(cx, cy);
        }

        function drawGlobe(cx, cy) {
            if (worldBorders) {
                stroke(COL[0], COL[1], COL[2], 120);
                strokeWeight(1.5);
                noFill();
                drawingContext.beginPath();
                geoPath(worldBorders);
                drawingContext.stroke();
            }
            stroke(COL[0], COL[1], COL[2], 40);
            strokeWeight(0.5);
            drawingContext.beginPath();
            geoPath(d3.geoGraticule()());
            drawingContext.stroke();
            stroke(COL);
            strokeWeight(2.5);
            drawingContext.beginPath();
            geoPath({type: "Sphere"});
            drawingContext.stroke();
        }

        function drawDynamicLabels(cx, cy) {
            noStroke();
            textSize(10);
            textStyle(BOLD);

            // --- 1. LEO SATELLITE FORMATION (Intro Label) ---
            // Fades in at start (73), out as it hits the emitter area (84)
            let introAlpha = 0;
            if (satAngle > 73 && satAngle < 86) {
                if (satAngle < 78) {
                    introAlpha = map(satAngle, 73, 78, 0, 255);
                } else if (satAngle > 82) {
                    introAlpha = map(satAngle, 82, 86, 255, 0);
                } else {
                    introAlpha = 255;
                }
            }
            fill(COL[0], COL[1], COL[2], introAlpha);
            textAlign(LEFT, BOTTOM);
            // entryX is the start point of the orbit arc
            let entryX = cx + cos(255) * (R + H);
            let entryY = cy + sin(255) * (R + H);
            text("LEO SATELLITE FORMATION", entryX + 80, entryY - 100);

            // --- 2. EMITTER IDENTIFIED ---
            const eTarget = 84;
            let eAlpha = 0;
            if (satAngle > eTarget - 4 && satAngle < eTarget + 6) {
                if (satAngle < eTarget) {
                    eAlpha = map(satAngle, eTarget - 4, eTarget, 0, 255);
                } else {
                    eAlpha = map(satAngle, eTarget, eTarget + 6, 255, 0);
                }
            }
            fill(COL[0], COL[1], COL[2], eAlpha);
            textAlign(RIGHT, BOTTOM);
            let [ex, ey] = getSurfacePos(cx, cy, eTarget);
            text("EMITTER IDENTIFIED", ex - 15, ey - 25);

            // --- 3. GROUND STATION DATA TRANSFER ---
            const gTarget = 96;
            let gAlpha = 0;
            if (satAngle > gTarget - 4 && satAngle < gTarget + 8) {
                if (satAngle < gTarget) {
                    gAlpha = map(satAngle, gTarget - 4, gTarget, 0, 255);
                } else {
                    gAlpha = map(satAngle, gTarget, gTarget + 8, 255, 0);
                }
            }
            fill(COL[0], COL[1], COL[2], gAlpha);
            textAlign(LEFT, BOTTOM);
            let [gx, gy] = getSurfacePos(cx, cy, gTarget);
            text("DATA TRANSFER TO GROUND STATION", gx + 20, gy - 20);
        }

        function drawSatellite(x, y, angle, alpha) {
            push();
            translate(x, y);
            rotate(angle - 90);
            fill(COL[0], COL[1], COL[2], alpha);
            noStroke();
            rectMode(CENTER);
            square(0, 0, 7); 
            stroke(COL[0], COL[1], COL[2], alpha);
            strokeWeight(2);
            line(-12, 0, 12, 0); 
            pop();
        }

        function getSurfacePos(cx, cy, ang) {
            let x = cx + cos(270 + (ang - 90)) * R;
            let y = cy + sin(270 + (ang - 90)) * R;
            return [x, y];
        }

        function drawIcon(cx, cy, ang, type) {
            let [x, y] = getSurfacePos(cx, cy, ang);
            push();
            translate(x, y);
            rotate(ang - 90);
            stroke(COL);
            strokeWeight(2);
            if (type === 'emitter') {
                line(0, 0, 0, -20);
                line(-7, -13, 7, -13);
                noFill();
                for (let i = 0; i < 3; i++) {
                    let cycle = 180; 
                    let p = ((frameCount + (i * 60)) % cycle) / cycle; 
                    let waveDist = p * (H * 1.8); 
                    stroke(COL[0], COL[1], COL[2], (1 - p) * 200);
                    arc(0, -20, waveDist * 1.2, waveDist, 230, 310);
                }
            } else {
                line(0, 0, 0, -5); 
                noFill();
                arc(0, -15, 24, 14, 0, 180); 
                line(0, -15, 0, -5); 
            }
            pop();
        }

        function drawDashedLine(x1, y1, x2, y2, alpha) {
            const numSegments = 10;
            const speed = frameCount * 0.15; 
            for (let i = 0; i < numSegments; i++) {
                let tStart = (i / numSegments + speed) % 1;
                let tEnd = tStart + 0.03; 
                if (tEnd <= 1.0) {
                    let px1 = lerp(x1, x2, tStart);
                    let py1 = lerp(y1, y2, tStart);
                    let px2 = lerp(x1, x2, tEnd);
                    let py2 = lerp(y1, y2, tEnd);
                    stroke(COL[0], COL[1], COL[2], map(tStart, 0, 1, alpha, alpha * 0.3));
                    strokeWeight(2);
                    line(px1, py1, px2, py2);
                }
            }
        }
    </script>
</body>
</html>
