<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: transparent; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 12px; }
        canvas { border: 1px solid #333; }
        #status { color: #ffa500; font-family: monospace; font-size: 13px; }
        body.embed-mode canvas { border: none; }
        body.embed-mode #status { display: none; }
    </style>
</head>
<body>
    <div id="status">Waiting for world data…</div>
    <script>
        const COL = [242, 100, 28];
        const R = 1600;
        const H = 140;
        const START_ANG = 76;
        const END_ANG = 104;
        // One cycle = (104-76) / 0.3 = 93.3 frames at 24 fps ≈ 3.9 s → record 4 s
        const STEP = 0.1; // same visual speed as 0.12 @ 60 fps
        const REC_SECONDS = 12;

        const EMBED_MODE = new URLSearchParams(location.search).has('embed');
        if (EMBED_MODE) document.body.classList.add('embed-mode');

        let satAngle = START_ANG;
        let worldBorders = null;
        let globeBuffer = null;
        let recStarted = false;

        const VIEW_LON = 90;
        const VIEW_LAT = -5;

        function renderGlobeToBuffer() {
            const cx = width / 2;
            const cy = height + 1510;

            if (globeBuffer) globeBuffer.clear();
            else globeBuffer = createGraphics(width, height);

            const proj = d3.geoOrthographic()
                .scale(R)
                .translate([cx, cy])
                .rotate([-VIEW_LON, -VIEW_LAT, 0])
                .clipAngle(90);
            const path = d3.geoPath(proj, globeBuffer.drawingContext);

            globeBuffer.stroke(COL[0], COL[1], COL[2], 40);
            globeBuffer.strokeWeight(0.5);
            globeBuffer.noFill();
            globeBuffer.drawingContext.beginPath();
            path(d3.geoGraticule()());
            globeBuffer.drawingContext.stroke();

            if (worldBorders) {
                globeBuffer.stroke(COL[0], COL[1], COL[2], 120);
                globeBuffer.strokeWeight(1.5);
                globeBuffer.drawingContext.beginPath();
                path(worldBorders);
                globeBuffer.drawingContext.stroke();
            }

            globeBuffer.stroke(COL[0], COL[1], COL[2], 255);
            globeBuffer.strokeWeight(2.5);
            globeBuffer.drawingContext.beginPath();
            path({type: "Sphere"});
            globeBuffer.drawingContext.stroke();
        }

        async function loadWorldData() {
            document.getElementById('status').textContent = 'Loading world data…';
            const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
            const data = await response.json();
            worldBorders = topojson.mesh(data, data.objects.countries);
            renderGlobeToBuffer();
            document.getElementById('status').textContent = 'Ready — starting capture…';
        }

        function setup() {
            createCanvas(534, 350);
            frameRate(24);
            angleMode(DEGREES);
            textFont('Inter');
            renderGlobeToBuffer();
            loadWorldData();
        }

        function draw() {
            clear();
            const cx = width / 2;
            const cy = height + 1510;

            if (globeBuffer) image(globeBuffer, 0, 0);

            // Start recording once globe is ready, reset to cycle start
            if (worldBorders && !recStarted) {
                recStarted = true;
                satAngle = START_ANG;
                if (!EMBED_MODE) startVideoRecording();
            }

            stroke(COL[0], COL[1], COL[2], 30);
            strokeWeight(1);
            noFill();
            arc(cx, cy, (R + H) * 2, (R + H) * 2, 255, 285);

            satAngle += STEP;
            if (satAngle > END_ANG) satAngle = START_ANG;

            let satAlpha = 255;
            let currentProgress = satAngle - START_ANG;
            let totalRange = END_ANG - START_ANG;
            if (currentProgress < totalRange * 0.1) {
                satAlpha = map(currentProgress, 0, totalRange * 0.1, 0, 255);
            } else if (currentProgress > totalRange * 0.9) {
                satAlpha = map(currentProgress, totalRange * 0.9, totalRange, 255, 0);
            }

            drawEmitter(cx, cy, 84);
            drawGroundStation(cx, cy, 96);

            if (abs(satAngle - 96) < 3.5) {
                let [tx, ty] = getSurfacePos(cx, cy, 96);
                let lx = cx + cos(270 + (satAngle - 90)) * (R + H);
                let ly = cy + sin(270 + (satAngle - 90)) * (R + H);
                drawDashedLine(lx, ly, tx, ty, satAlpha);
            }

            let formation = [
                { a: satAngle, h: H },
                { a: satAngle - 1.2, h: H + 12 },
                { a: satAngle - 1.2, h: H - 12 }
            ];
            formation.forEach(sat => {
                let sx = cx + cos(270 + (sat.a - 90)) * (R + sat.h);
                let sy = cy + sin(270 + (sat.a - 90)) * (R + sat.h);
                drawSatellite(sx, sy, sat.a, satAlpha);
            });

            drawDynamicLabels(cx, cy);
        }

        function drawDynamicLabels(cx, cy) {
            noStroke();
            textSize(12);
            textStyle(BOLD);

            let introAlpha = 0;
            if (satAngle > 76 && satAngle < 90) {
                if (satAngle < 84) introAlpha = map(satAngle, 76, 84, 0, 255);
                else if (satAngle > 86) introAlpha = map(satAngle, 86, 90, 255, 0);
                else introAlpha = 255;
            }
            fill(COL[0], COL[1], COL[2], introAlpha);
            textAlign(LEFT, BOTTOM);
            let entryX = cx + cos(255) * (R + H);
            let entryY = cy + sin(255) * (R + H);
            text("LEO SATELLITE FORMATION", entryX + 210, entryY - 100);

            const eTarget = 84;
            let eAlpha = 0;
            if (satAngle > eTarget - 4 && satAngle < eTarget + 6) {
                eAlpha = (satAngle < eTarget) ? map(satAngle, eTarget - 4, eTarget, 0, 255) : map(satAngle, eTarget, eTarget + 6, 255, 0);
            }
            fill(COL[0], COL[1], COL[2], eAlpha);
            textAlign(LEFT, BOTTOM);
            let [ex, ey] = getSurfacePos(cx, cy, eTarget);
            text("EMITTER IDENTIFIED", ex + 15, ey - 25);

            const gTarget = 96;
            let gAlpha = 0;
            if (satAngle > gTarget - 4 && satAngle < gTarget + 8) {
                gAlpha = (satAngle < gTarget) ? map(satAngle, gTarget - 4, gTarget, 0, 255) : map(satAngle, gTarget, gTarget + 8, 255, 0);
            }
            fill(COL[0], COL[1], COL[2], gAlpha);
            textAlign(RIGHT, BOTTOM);
            let [gx, gy] = getSurfacePos(cx, cy, gTarget);
            text("DATA TRANSFER TO GROUND STATION", gx - 15, gy - 20);
        }

        function drawSatellite(x, y, angle, alpha) {
            push();
            translate(x, y);
            rotate(angle - 90);
            fill(COL[0], COL[1], COL[2], alpha);
            noStroke();
            rectMode(CENTER);
            square(0, 0, 7);
            stroke(COL[0], COL[1], COL[2], alpha);
            strokeWeight(2);
            line(-12, 0, 12, 0);
            pop();
        }

        function getSurfacePos(cx, cy, ang) {
            let x = cx + cos(270 + (ang - 90)) * R;
            let y = cy + sin(270 + (ang - 90)) * R;
            return [x, y];
        }

        function drawEmitter(cx, cy, ang) {
            let [x, y] = getSurfacePos(cx, cy, ang);
            push();
            translate(x, y);
            rotate(ang - 90);
            stroke(COL);
            strokeWeight(2);
            noFill();
            triangle(-10, 0, 10, 0, 0, -20);
            circle(0, -20, 8);
            for (let i = 0; i < 6; i++) {
                let cycle = 180;
                let p = ((frameCount + (i * 30)) % cycle) / cycle;
                let waveDist = p * (H * 1.8);
                stroke(COL[0], COL[1], COL[2], (1 - p) * 200);
                arc(0, -20, waveDist * 1.2, waveDist, 230, 310);
            }
            pop();
        }

        function drawGroundStation(cx, cy, ang) {
            let [x, y] = getSurfacePos(cx, cy, ang);
            push();
            translate(x, y);
            rotate(ang - 90);
            stroke(COL);
            strokeWeight(2);
            noFill();
            triangle(-8, 0, 8, 0, 0, -8);
            arc(0, -16, 26, 16, 0, 180);
            arc(0, -16, 26, 5, 0, 180);
            line(0, -10, 0, -20);
            pop();
        }

        function startVideoRecording() {
            const canvasEl = document.querySelector('canvas');
            const stream = canvasEl.captureStream(24);
            const mime = 'video/webm;codecs=vp9';
            if (!MediaRecorder.isTypeSupported(mime)) {
                document.getElementById('status').textContent = 'VP9 not supported — transparent WebM requires Chrome.';
                return;
            }
            const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: mime });
                const a = Object.assign(document.createElement('a'), {
                    href: URL.createObjectURL(blob),
                    download: 'focused.webm'
                });
                a.click();
                document.getElementById('status').textContent = 'Done! focused.webm downloaded.';
            };
            recorder.start();
            document.getElementById('status').textContent = `Recording ${REC_SECONDS}s video…`;
            setTimeout(() => recorder.stop(), REC_SECONDS * 1000);
        }

        function drawDashedLine(x1, y1, x2, y2, alpha) {
            const numSegments = 10;
            const speed = frameCount * 0.15;
            for (let i = 0; i < numSegments; i++) {
                let tStart = (i / numSegments + speed) % 1;
                let tEnd = tStart + 0.03;
                if (tEnd <= 1.0) {
                    let px1 = lerp(x1, x2, tStart);
                    let py1 = lerp(y1, y2, tStart);
                    let px2 = lerp(x1, x2, tEnd);
                    let py2 = lerp(y1, y2, tEnd);
                    stroke(COL[0], COL[1], COL[2], map(tStart, 0, 1, alpha, alpha * 0.3));
                    strokeWeight(2);
                    line(px1, py1, px2, py2);
                }
            }
        }
    </script>
</body>
</html>
